name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable', cache: true }
      - run: flutter pub get
      
      # Itt adjuk hozzá az internet engedélyt a manifest-hez fordítás előtt, 
      # anélkül, hogy az egész mappát létrehoznánk/felülírnánk.
      - run: |
          mkdir -p android/app/src/main
          echo '<manifest xmlns:android="http://schemas.android.com/apk/res/android"><uses-permission android:name="android.permission.INTERNET"/></manifest>' > android/app/src/main/AndroidManifest.xml

      - run: flutter build apk --release --dart-define=SPORTSDB_API_KEY=${{ secrets.SPORTSDB_API_KEY }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: Zsolt-AI-PRO-APK
          path: build/app/outputs/flutter-apk/app-release.apk
