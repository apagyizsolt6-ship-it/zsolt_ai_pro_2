name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable', cache: true }
      - run: flutter pub get
      
      # Töröljük a félkész mappát, ha létezne
      - run: rm -rf android
      
      # Létrehozzuk a projektet v2 embedding-gel, ami alapból tartalmazza az internet-engedélyt
      - run: flutter create . --platforms=android --org=hu.zsoltproai
      
      - run: flutter build apk --release --dart-define=SPORTSDB_API_KEY=${{ secrets.SPORTSDB_API_KEY }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: Zsolt-AI-PRO-APK
          path: build/app/outputs/flutter-apk/app-release.apk
