name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: 'temurin', java-version: '17' }
      - uses: subosito/flutter-action@v2
        with: { channel: 'stable', cache: true }
      - run: flutter pub get
      
      # Ez a parancs létrehozza a projektet a legmodernebb beállításokkal, 
      # és az Android manifest-be automatikusan bekerül az internet engedély.
      - run: flutter create . --platforms=android
      
      # Itt hozzáadjuk az internet engedélyt egyetlen lépésben, 
      # hogy biztosan benne legyen az alkalmazásban.
      - run: |
          sed -i '/<application/a \    android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />' android/app/src/main/AndroidManifest.xml
      
      - run: flutter build apk --release --dart-define=SPORTSDB_API_KEY=${{ secrets.SPORTSDB_API_KEY }}
      
      - uses: actions/upload-artifact@v4
        with:
          name: Zsolt-AI-PRO-APK
          path: build/app/outputs/flutter-apk/app-release.apk
