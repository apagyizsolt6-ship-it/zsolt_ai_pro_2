name: Flutter Android Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter Version
        run: flutter --version

      - name: Create Android Project
        run: |
          flutter create . \
            --platforms=android \
            --project-name=zsolt_ai_pro \
            --org=hu.zsoltproai \
            --overwrite

      - name: Remove Default Widget Test
        run: |
          rm -rf test

      - name: Install Packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=SPORTSDB_API_KEY=${{ secrets.SPORTSDB_API_KEY }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Zsolt-AI-PRO-APK
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 14
