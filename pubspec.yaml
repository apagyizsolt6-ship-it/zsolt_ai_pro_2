name: zsolt_ai_pro
description: ZSOLT AI PRO - AI sportfogadási asszisztens

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # UI
  google_fonts: ^6.3.0

  # State Management
  provider: ^6.1.5

  # HTTP
  http: ^1.5.0

  # Storage
  shared_preferences: ^2.5.3

  # Animations
  flutter_animate: ^4.5.2

  # SVG
  flutter_svg: ^2.2.1

  # Icons
  hugeicons: ^0.0.11

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
